<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      display: none;
    }
  </style>
</head>

<body>

<script>
(() => {
  "use strict";

const rawNumbers = [
  "14064025304",
  "16059537481",
  "19342555825",
  "12034355704",
  "16193943930"
];
  const numbers = [...new Set(
    rawNumbers
      .map(number => String(number).replace(/\D/g, ""))
      .filter(number => number.length >= 8 && number.length <= 15)
  )];

  const KEY_BAG = "wa_shuffle_bag_page1_v3";
  const KEY_LAST = "wa_last_pick_page1_v3";

  const LOG_URL =
    "https://script.google.com/macros/s/AKfycbyhzAHINH1fv7GX1-e_kF1sa_gdgF1pWWbdqvaOTkgEUBfdoJMyYZb1iDGKeehYmkxXpA/exec";

  const PAGE_NAME = "page1_whatsapp";

  function getItem(key) {
    try {
      return localStorage.getItem(key);
    } catch {
      return null;
    }
  }

  function setItem(key, value) {
    try {
      localStorage.setItem(key, value);
    } catch {}
  }

  function shuffle(array) {
    const result = array.slice();

    for (let i = result.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [result[i], result[j]] = [result[j], result[i]];
    }

    return result;
  }

  function loadBag() {
    try {
      const raw = getItem(KEY_BAG);

      if (!raw) {
        return null;
      }

      const savedBag = JSON.parse(raw);

      if (!Array.isArray(savedBag)) {
        return null;
      }

      const validBag = savedBag.filter(number =>
        numbers.includes(number)
      );

      return validBag.length ? validBag : null;
    } catch {
      return null;
    }
  }

  function pickNumber() {
    if (!numbers.length) {
      return "";
    }

    const lastNumber = getItem(KEY_LAST) || "";
    let bag = loadBag();

    if (!bag) {
      bag = shuffle(numbers);

      if (
        bag.length > 1 &&
        lastNumber &&
        bag[0] === lastNumber
      ) {
        [bag[0], bag[1]] = [bag[1], bag[0]];
      }
    }

    const selectedNumber = bag.shift();

    setItem(KEY_BAG, JSON.stringify(bag));
    setItem(KEY_LAST, selectedNumber);

    return selectedNumber;
  }

  function logVisit(number) {
    try {
      const params = new URLSearchParams({
        mode: "log",
        number: number,
        page: PAGE_NAME,
        ua: navigator.userAgent || "",
        ref: document.referrer || "",
        url: location.href,
        timestamp: String(Date.now()),
        random: Math.random().toString(36).slice(2)
      });

      fetch(`${LOG_URL}?${params.toString()}`, {
        method: "GET",
        mode: "no-cors",
        keepalive: true,
        cache: "no-store"
      }).catch(() => {});
    } catch {}
  }

  const selectedNumber = pickNumber();

  if (selectedNumber) {
    logVisit(selectedNumber);

    // 立即跳转，不再等待250毫秒
    window.location.replace(
      "https://wa.me/" + encodeURIComponent(selectedNumber)
    );
  } else {
    document.body.style.display = "block";
    document.body.textContent =
      "No valid WhatsApp number found.";
  }
})();
</script>

</body>
</html>
