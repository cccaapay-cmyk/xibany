<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title></title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #fff;
      display: none;
    }
  </style>
</head>
<body>

<script>
(() => {
  const numbers = [
    "34604176450",
    "34612233484",
    "34604175423",
    "34632985876",
    "34633721615",
    "34603107337",
    "34633905043",
    "34623728301"
  ];

  const KEY_BAG = "wa_shuffle_bag_page1";
  const KEY_LAST = "wa_last_pick_page1";

  function getItem(key) {
    try {
      return localStorage.getItem(key);
    } catch {
      return null;
    }
  }

  function setItem(key, value) {
    try {
      localStorage.setItem(key, value);
    } catch {}
  }

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = (Math.random() * (i + 1)) | 0;
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function loadBag() {
    try {
      const raw = getItem(KEY_BAG);
      if (!raw) return null;

      const bag = JSON.parse(raw);
      return Array.isArray(bag) && bag.length ? bag : null;
    } catch {
      return null;
    }
  }

  function pick() {
    if (!numbers.length) return "";

    let bag = loadBag();
    const last = getItem(KEY_LAST) || "";

    if (!bag) {
      bag = shuffle(numbers);

      if (bag.length > 1 && bag[0] === last) {
        [bag[0], bag[1]] = [bag[1], bag[0]];
      }
    }

    const current = bag[0];

    if (bag.length > 1) {
      setItem(KEY_BAG, JSON.stringify(bag.slice(1)));
    } else {
      setItem(KEY_BAG, "[]");
    }

    setItem(KEY_LAST, current);
    return current;
  }

  const n = pick();

  if (n) {
    location.replace("https://wa.me/" + n);
  } else {
    document.body.style.display = "block";
    document.body.textContent = "No valid WhatsApp number found.";
  }
})();
</script>

</body>
</html>
