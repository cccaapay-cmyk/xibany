<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title></title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #fff;
      display: none;
    }
  </style>
</head>
<body>

<script>
(() => {
  const numbers = [
    "447467459031",
    "32466246123"
  ];

  const KEY_BAG = "wa_shuffle_bag_page1_v2";
  const KEY_LAST = "wa_last_pick_page1_v2";
  const LOG_URL = "https://script.google.com/macros/s/AKfycbyhzAHINH1fv7GX1-e_kF1sa_gdgF1pWWbdqvaOTkgEUBfdoJMyYZb1iDGKeehYmkxXpA/exec";
  const PAGE_NAME = "page1_whatsapp";

  function getItem(key) {
    try {
      return localStorage.getItem(key);
    } catch {
      return null;
    }
  }

  function setItem(key, value) {
    try {
      localStorage.setItem(key, value);
    } catch {}
  }

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = (Math.random() * (i + 1)) | 0;
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function loadBag() {
    try {
      const raw = getItem(KEY_BAG);
      if (!raw) return null;

      const bag = JSON.parse(raw);
      if (!Array.isArray(bag) || !bag.length) return null;

      const validBag = bag.filter(n => numbers.includes(n));
      return validBag.length ? validBag : null;
    } catch {
      return null;
    }
  }

  function pick() {
    if (!numbers.length) return "";

    let bag = loadBag();
    const last = getItem(KEY_LAST) || "";

    if (!bag) {
      bag = shuffle(numbers);
      if (bag.length > 1 && bag[0] === last) {
        [bag[0], bag[1]] = [bag[1], bag[0]];
      }
    }

    const current = bag[0];
    setItem(KEY_BAG, JSON.stringify(bag.slice(1)));
    setItem(KEY_LAST, current);

    return current;
  }

  function logVisit(number) {
    try {
      const qs =
        "?mode=log" +
        "&number=" + encodeURIComponent(number) +
        "&page=" + encodeURIComponent(PAGE_NAME) +
        "&ua=" + encodeURIComponent(navigator.userAgent || "") +
        "&ref=" + encodeURIComponent(document.referrer || "");

      const img = new Image();
      img.src = LOG_URL + qs;
    } catch {}
  }

  const n = pick();

  if (n) {
    logVisit(n);

    setTimeout(() => {
      location.replace("https://wa.me/" + n);
    }, 120);
  } else {
    document.body.style.display = "block";
    document.body.textContent = "No valid WhatsApp number found.";
  }
})();
</script>

</body>
</html>
